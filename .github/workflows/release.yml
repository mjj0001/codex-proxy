name: 发布发行版

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: write-all

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: ⚙️ 设置 Go 环境
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.0"
          cache: true

      - name: 📦 下载依赖
        run: go mod download

      - name: 🔨 构建项目
        run: |
          # Linux builds
          GOOS=linux GOARCH=amd64 go build -v -o codex-proxy-linux-amd64
          GOOS=linux GOARCH=arm64 go build -v -o codex-proxy-linux-arm64
          GOOS=linux GOARCH=386 go build -v -o codex-proxy-linux-386

          # Windows builds
          GOOS=windows GOARCH=amd64 go build -v -o codex-proxy-windows-amd64.exe
          GOOS=windows GOARCH=arm64 go build -v -o codex-proxy-windows-arm64.exe
          GOOS=windows GOARCH=386 go build -v -o codex-proxy-windows-386.exe

          # macOS builds
          GOOS=darwin GOARCH=amd64 go build -v -o codex-proxy-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -v -o codex-proxy-darwin-arm64

          # FreeBSD builds
          GOOS=freebsd GOARCH=amd64 go build -v -o codex-proxy-freebsd-amd64
          GOOS=freebsd GOARCH=arm64 go build -v -o codex-proxy-freebsd-arm64

          # Other Linux architectures
          GOOS=linux GOARCH=riscv64 go build -v -o codex-proxy-linux-riscv64
          GOOS=linux GOARCH=ppc64 go build -v -o codex-proxy-linux-ppc64

          # DragonFly BSD
          GOOS=dragonfly GOARCH=amd64 go build -v -o codex-proxy-dragonfly-amd64

          # Solaris
          GOOS=solaris GOARCH=amd64 go build -v -o codex-proxy-solaris-amd64

          # AIX
          GOOS=aix GOARCH=ppc64 go build -v -o codex-proxy-aix-ppc64

          # Plan9
          GOOS=plan9 GOARCH=amd64 go build -v -o codex-proxy-plan9-amd64
          GOOS=plan9 GOARCH=386 go build -v -o codex-proxy-plan9-386

      - name: 🚀 运行 release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: 🗃 上传构建产物到 GitHub Release
        if: ${{ steps.release.outputs.release_created }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.tag_name }}
          body: ${{ steps.release.outputs.release_notes }}
          files: |
            codex-proxy-linux-amd64
            codex-proxy-linux-arm64
            codex-proxy-linux-386
            codex-proxy-windows-amd64.exe
            codex-proxy-windows-arm64.exe
            codex-proxy-windows-386.exe
            codex-proxy-darwin-amd64
            codex-proxy-darwin-arm64
            codex-proxy-freebsd-amd64
            codex-proxy-freebsd-arm64
            codex-proxy-linux-riscv64
            codex-proxy-linux-ppc64
            codex-proxy-dragonfly-amd64
            codex-proxy-solaris-amd64
            codex-proxy-aix-ppc64
            codex-proxy-plan9-amd64
            codex-proxy-plan9-386
