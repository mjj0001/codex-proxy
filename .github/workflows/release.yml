# 矩阵多任务并行：各架构独立 Job，同时编译；每个 zip = 单架构二进制 + config.yaml
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25'
  GOFLAGS: '-trimpath -buildvcs=false'
  LDFLAGS: '-s -w'

jobs:
  build-zip:
    name: ${{ matrix.slug }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          # Linux
          - { goos: linux, goarch: amd64, slug: linux-amd64 }
          - { goos: linux, goarch: '386', slug: linux-386 }
          - { goos: linux, goarch: arm64, slug: linux-arm64 }
          - { goos: linux, goarch: arm, goarm: '7', slug: linux-armv7 }
          # Windows
          - { goos: windows, goarch: amd64, slug: windows-amd64 }
          - { goos: windows, goarch: '386', slug: windows-386 }
          - { goos: windows, goarch: arm64, slug: windows-arm64 }
          # macOS
          - { goos: darwin, goarch: amd64, slug: darwin-amd64 }
          - { goos: darwin, goarch: arm64, slug: darwin-arm64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build & zip
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.goarm }}" ]; then export GOARM="${{ matrix.goarm }}"; fi
          mkdir -p pack
          if [ "$GOOS" = "windows" ]; then BIN="codex-proxy.exe"; else BIN="codex-proxy"; fi
          go build -ldflags="${{ env.LDFLAGS }}" -o "pack/$BIN" .
          cp config.example.yaml pack/config.yaml
          ZIP="codex-proxy-${{ matrix.slug }}.zip"
          (cd pack && zip -r "../$ZIP" .)
          unzip -l "$ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.slug }}
          path: codex-proxy-${{ matrix.slug }}.zip

  publish-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-zip
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: SHA256
        working-directory: dist
        run: |
          shopt -s nullglob
          z=( *.zip )
          [ ${#z[@]} -ge 1 ] || { ls -la; exit 1; }
          sha256sum "${z[@]}" | tee SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt

  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
